name: Deploy

on: push

jobs:
  build_wheels_mac_ubuntu:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
      
      - name: Install build tools
        run: python -m pip install --upgrade pip  setuptools==75.3.0

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0.0
        env:
          CIBW_SKIP: '*-musllinux_*'
          CIBW_ENABLE: pypy
          MACOSX_DEPLOYMENT_TARGET: "11"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl


  build_wheels_mac_arm64:
    name: Build wheels on macos-14
    runs-on: macos-14 # apple silicon

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5

      - name: Install build tools (macOS)
        run: |
          brew update
          brew install autoconf automake

      - name: Install build tools
        run: python -m pip install --upgrade pip  setuptools==75.3.0

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0.0
        env:
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "" # skip repair step
          CIBW_ENABLE: pypy

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-macos-14
          path: ./wheelhouse/*.whl


  run-tox-test:
    name: Test wheels on mac and linux
    needs: [build_wheels_mac_ubuntu, build_wheels_mac_arm64]
    runs-on: ${{ matrix.version.os }}
    strategy:
      matrix:
        version:
          - {os: ubuntu-latest, python: '3.10'}
          - {os: ubuntu-latest, python: '3.12'}
          - {os: macos-14, python: '3.10'}
          - {os: macos-14, python: '3.12'}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - uses: actions/download-artifact@master
        with:
          name: cibw-wheels-${{ matrix.version.os }}
          path: dist

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.version.python }}

      - name: Install dependencies
        run: |
          pip3 install tox

      - name: Run basic test 
        run: |

          cd misc/
          PIP_FIND_LINKS='${{ github.workspace }}/dist' tox -e unified-planning


  deploy-pypi:
    runs-on: ubuntu-latest
    needs: [run-tox-test]
    if: github.repository == 'speckdavid/up-symk' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/download-artifact@master
        with:
          name: cibw-wheels-ubuntu-latest
          path: dist

      - uses: actions/download-artifact@master
        with:
          name: cibw-wheels-macos-14
          path: dist

      - run: ls dist

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@master
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}